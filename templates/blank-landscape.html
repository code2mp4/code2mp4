<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920,height=1080">
  <style>
    :root {
      --bg: #0D1117;
      --surface: #161B22;
      --fg: #E6EDF3;
      --accent: #58A6FF;
      --accent2: #3FB950;
      --muted: #8B949E;
      --border: #30363D;
      --radius: 8px;
      --font-display: 'JetBrains Mono', 'Fira Code', monospace;
      --font-body: 'Inter', system-ui, -apple-system, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: var(--bg);
      width: 1920px; height: 1080px;
      overflow: hidden;
    }
    body {
      color: var(--fg);
      font-family: var(--font-body);
    }
    #stage {
      position: relative;
      width: 1920px; height: 1080px;
      overflow: hidden;
    }
    .scene {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 24px;
      pointer-events: none;
    }
    .scene:first-child { opacity: 1; }
    .scene-content {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      width: 100%; height: 100%;
      padding: 160px;
      gap: 24px;
      box-sizing: border-box;
    }
    .headline {
      font-family: var(--font-display);
      font-size: 96px;
      font-weight: 700;
      color: var(--accent);
      text-shadow: 0 0 40px var(--accent);
      text-align: center;
    }
    .subhead {
      font-size: 32px;
      color: var(--fg);
      opacity: 0.85;
      text-align: center;
    }
    .body-text {
      font-size: 24px;
      color: var(--muted);
      text-align: center;
      max-width: 700px;
      line-height: 1.5;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
</head>
<body>
<div id="stage" data-composition-id="ov-scaffold" data-start="0" data-duration="8" data-width="1920" data-height="1080">

  <!-- Scene 1: Title -->
  <div class="scene" data-scene="1" style="opacity: 1">
    <div class="scene-content">
      <div class="headline" id="s1-title">Your Title Here</div>
      <div class="subhead" id="s1-sub">Your subtitle or tagline</div>
    </div>
  </div>

  <!-- Scene 2: Content -->
  <div class="scene" data-scene="2">
    <div class="scene-content">
      <div class="headline" id="s2-title" style="font-size: 72px;">Scene Two</div>
      <div class="body-text" id="s2-body">Add your content here. Replace this text with your message.</div>
    </div>
  </div>

  <!-- Scene 3: CTA -->
  <div class="scene" data-scene="3">
    <div class="scene-content">
      <div class="headline" id="s3-cta" style="font-size: 80px; color: var(--accent2);">Call to Action</div>
      <div class="subhead" id="s3-url">your-website.com</div>
    </div>
  </div>

</div>

<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });

  // ── Scene 1: Entrances ──────────────────────────────────────────
  tl.from("#s1-title", { y: 60, opacity: 0, duration: 0.7, ease: "power3.out" }, 0.3);
  tl.from("#s1-sub",  { y: 30, opacity: 0, duration: 0.5, ease: "power2.out" }, 0.7);

  // ── Scene 1 → 2: Crossfade ──────────────────────────────────────
  const scene2 = document.querySelector('[data-scene="2"]');
  tl.to(scene2, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 3.0);
  tl.to('[data-scene="1"]', { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 3.0);

  // ── Scene 2: Entrances ──────────────────────────────────────────
  tl.from("#s2-title", { y: 40, opacity: 0, duration: 0.5, ease: "power2.out" }, 3.2);
  tl.from("#s2-body",  { opacity: 0, duration: 0.5, ease: "power1.out" }, 3.5);

  // ── Scene 2 → 3: Crossfade ──────────────────────────────────────
  const scene3 = document.querySelector('[data-scene="3"]');
  tl.to(scene3, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 5.5);
  tl.to('[data-scene="2"]', { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 5.5);

  // ── Scene 3: Entrances ──────────────────────────────────────────
  tl.from("#s3-cta", { scale: 1.1, opacity: 0, duration: 0.5, ease: "back.out(1.4)" }, 5.7);
  tl.from("#s3-url", { y: 20, opacity: 0, duration: 0.5, ease: "power2.out" }, 6.0);

  window.__timelines["ov-scaffold"] = tl;
</script>
</body>
</html>
